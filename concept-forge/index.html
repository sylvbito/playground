*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cf-bg:#1a1a2e;
  --cf-surface:#16213e;

  --cf-text-secondary:#a0a0b8;
  --cf-accent:#7c5ce7;

body{

  color:var(--cf-text);

  display:flex;
  flex-direction:column;
  overflow:hidden;
}
/* Header */
.cf-header{
  background:var(--cf-surface);
  border-bottom:1px solid var(--cf-border);
  padding:0.75rem 1.5rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.cf-title{
  font-size:1.1rem;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:0.75rem;
}
.cf-title span{color:var(--cf-accent)}
.cf-source{
  font-size:0.8rem;
  color:var(--cf-text-secondary);
  max-width:300px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
/* Tabs */
.cf-tabs{
  display:flex;
  background:var(--cf-surface);
  border-bottom:1px solid var(--cf-border);
  flex-shrink:0;
  overflow-x:auto;
}
.tab{
  flex:1;
  min-width:120px;
  padding:0.85rem 1.25rem;
  background:none;
  border:none;
  border-bottom:3px solid transparent;
  color:var(--cf-text-secondary);
  font-size:0.9rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.15rem;
  white-space:nowrap;
}
.tab:hover{color:var(--cf-text);background:rgba(255,255,255,0.03)}
.tab.active{color:var(--cf-accent);border-bottom-color:var(--cf-accent)}
.tab-subtitle{font-size:0.7rem;font-weight:400;color:var(--cf-text-secondary);opacity:0.7}
/* Views */
.cf-views{
  flex:1;
  display:flex;
  overflow:hidden;
}
.cf-view{
  flex:1;
  position:relative;
  overflow:hidden;
}
.cf-view.hidden{display:none}
.cf-view iframe{
  width:100%;
  height:100%;
  border:none;
}
/* Split mode */
.cf-views.split .cf-view{flex:0 0 50%}
.cf-views.split .cf-view:not(.split-visible){display:none}
.cf-views.split .cf-view.split-visible{display:block}
/* Controls */
.cf-controls{
  display:flex;
  gap:0.5rem;
  align-items:center;
}
.cf-btn{
  padding:0.5em 1em;
  border-radius:6px;
  border:1px solid var(--cf-border);
  background:var(--cf-surface);
  color:var(--cf-text);
  font-size:0.8rem;
  cursor:pointer;
  transition:all 0.15s;
}
.cf-btn:hover{background:var(--cf-border)}
.cf-btn.active{background:var(--cf-accent);border-color:var(--cf-accent);color:#fff}
/* Toolbar */
.cf-toolbar{
  background:var(--cf-surface);
  border-top:1px solid var(--cf-border);
  padding:0.5rem 1.5rem;
  display:flex;
  align-items:center;
  gap:1rem;
  flex-shrink:0;
  font-size:0.8rem;
}
.cf-toolbar .concept-name{font-weight:600;color:var(--cf-accent)}
.cf-toolbar .layout-list{color:var(--cf-text-secondary)}
.cf-toolbar .layout-list span{margin:0 0.25rem;padding:0.15em 0.5em;background:var(--cf-bg);border-radius:4px;font-size:0.75rem}
/* Responsive */
@media(max-width:768px){
  .cf-header{padding:0.6rem 1rem;flex-wrap:wrap;gap:0.5rem}
  .cf-source{max-width:180px;font-size:0.7rem}
  .cf-controls{gap:0.25rem}
  .cf-btn{font-size:0.7rem;padding:0.4em 0.7em}
  .tab{padding:0.65rem 0.75rem;font-size:0.8rem;min-width:80px}
}
</style>

};
let currentConcept = "original";
let splitMode = false;

// Load initial concept
document.addEventListener('DOMContentLoaded', () => {
  loadConcept(currentConcept);
});

function loadConcept(id) {
  const iframe = document.getElementById('iframe-' + id);
  if (iframe && CONCEPT_PAGES[id]) {
    iframe.srcdoc = CONCEPT_PAGES[id];
  }
  currentConcept = id;
  updateToolbar(id);
}

function updateToolbar(id) {
  const c = CONCEPTS.find(c => c.id === id);
  if (!c) return;
  document.querySelector('.concept-name').textContent = c.name;
  document.querySelector('.font-info').textContent = c.font_pairing;
  document.querySelector('.layout-list').innerHTML = 'Sections: ' + c.layout.map(s => '<span>' + s + '</span>').join('');
}

// Tab switching
document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  const conceptId = tab.dataset.concept;
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  
  if (splitMode) {
    // In split mode, show this concept alongside current
    const views = document.getElementById('views');
    views.querySelectorAll('.cf-view').forEach(v => v.classList.add('hidden'));
    views.querySelectorAll('.cf-view').forEach(v => v.classList.remove('split-visible'));
    const primary = document.getElementById('view-' + conceptId);
    primary.classList.remove('hidden');
    primary.classList.add('split-visible');
    if (conceptId !== currentConcept) {
      const secondary = document.getElementById('view-' + currentConcept);
      secondary.classList.remove('hidden');
      secondary.classList.add('split-visible');
      loadConcept(currentConcept);
    }
    loadConcept(conceptId);
  } else {
    document.querySelectorAll('.cf-view').forEach(v => v.classList.add('hidden'));
    const view = document.getElementById('view-' + conceptId);
    view.classList.remove('hidden');
    loadConcept(conceptId);
  }
});

// View mode buttons
document.getElementById('btn-single').addEventListener('click', () => {
  splitMode = false;
  document.getElementById('views').classList.remove('split');
  document.getElementById('btn-single').classList.add('active');
  document.getElementById('btn-split').classList.remove('active');
  document.querySelectorAll('.cf-view').forEach(v => {
    v.classList.remove('split-visible');
    v.classList.add('hidden');
  });
  const view = document.getElementById('view-' + currentConcept);
  view.classList.remove('hidden');
  document.getElementById('btn-single').classList.add('active');
});

document.getElementById('btn-split').addEventListener('click', () => {
  splitMode = true;
  document.getElementById('views').classList.add('split');
  document.getElementById('btn-split').classList.add('active');
  document.getElementById('btn-single').classList.remove('active');
  // Show current + first other
  const otherConcept = CONCEPTS.find(c => c.id !== currentConcept);
  if (otherConcept) {
    document.querySelectorAll('.cf-view').forEach(v => v.classList.add('hidden'));
    document.querySelectorAll('.cf-view').forEach(v => v.classList.remove('split-visible'));
    const primary = document.getElementById('view-' + currentConcept);
    const secondary = document.getElementById('view-' + otherConcept.id);
    primary.classList.remove('hidden');
    primary.classList.add('split-visible');
    secondary.classList.remove('hidden');
    secondary.classList.add('split-visible');
    loadConcept(currentConcept);
    loadConcept(otherConcept.id);
  }
});

// Export CSS
document.getElementById('btn-export').addEventListener('click', () => {
  const c = CONCEPTS.find(c => c.id === currentConcept);
  if (!c) return;
  const tokens = c.tokens;
  const css = `:root {
  --font-heading: '${tokens.typography.heading_font}', sans-serif;
  --font-body: '${tokens.typography.body_font}', sans-serif;
  --font-heading-weight: ${tokens.typography.heading_weight};
  --font-body-weight: ${tokens.typography.body_weight};
  --color-background: ${tokens.colors.background};
  --color-surface: ${tokens.colors.surface};
  --color-text: ${tokens.colors.text};
  --color-text-secondary: ${tokens.colors.text_secondary};
  --color-primary: ${tokens.colors.primary};
  --color-accent: ${tokens.colors.accent};
  --color-border: ${tokens.colors.border};
  --spacing-section: ${tokens.spacing.section};
  --spacing-component: ${tokens.spacing.component};
  --spacing-element: ${tokens.spacing.element};
  --border-radius: ${tokens.spacing.border_radius};
}`;
  navigator.clipboard.writeText(css).then(() => {
    alert('CSS tokens copied to clipboard!');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = css;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('CSS tokens copied!');
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 's' && !e.metaKey && !e.ctrlKey && !e.target.closest('input,textarea')) {
    document.getElementById('btn-export').click();
  }
  // 1-5 keys to switch concepts
  const num = parseInt(e.key);
  if (num >= 1 && num <= CONCEPTS.length) {
    const conceptId = CONCEPTS[num - 1].id;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('[data-concept="' + conceptId + '"]').classList.add('active');
    document.querySelectorAll('.cf-view').forEach(v => v.classList.add('hidden'));
    document.getElementById('view-' + conceptId).classList.remove('hidden');
    loadConcept(conceptId);
  }
});

// Responsive font loading
document.querySelectorAll('iframe').forEach(iframe => {
  iframe.addEventListener('load', () => {
    try {
      const doc = iframe.contentDocument;
      if (doc) {
        const links = doc.querySelectorAll('link[rel="stylesheet"]');
        links.forEach(l => {
          const clone = document.createElement('link');
          clone.rel = 'stylesheet';
          clone.href = l.href;
          doc.head.appendChild(clone);
        });
      }
    } catch(e) {}
  });
});
</script>
