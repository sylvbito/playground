<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth Strata — Cascade Layer Glass</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06060e;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      cursor: crosshair;
      -webkit-font-smoothing: antialiased;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .strata-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .stratum {
      position: absolute;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      pointer-events: auto;
      transition: border-color 0.6s ease;
      will-change: transform;
    }

    .stratum:hover {
      border-color: rgba(255, 255, 255, 0.35);
    }

    .stratum-label {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      pointer-events: none;
      transition: color 0.6s ease;
    }

    .stratum:hover .stratum-label {
      color: rgba(255, 255, 255, 0.85);
    }

    /* Layer 0 — @layer reset (outermost, most blur, widest) */
    .stratum-0 {
      width: min(680px, 85vw);
      height: min(440px, 55vh);
      backdrop-filter: blur(28px) brightness(1.05) saturate(1.1);
      -webkit-backdrop-filter: blur(28px) brightness(1.05) saturate(1.1);
      background: oklch(0.15 0.015 250 / 0.25);
      z-index: 1;
    }

    /* Layer 1 — @layer base */
    .stratum-1 {
      width: min(620px, 78vw);
      height: min(400px, 50vh);
      backdrop-filter: blur(20px) brightness(1.08) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) brightness(1.08) saturate(1.2);
      background: oklch(0.18 0.025 230 / 0.22);
      z-index: 2;
    }

    /* Layer 2 — @layer components */
    .stratum-2 {
      width: min(560px, 71vw);
      height: min(360px, 45vh);
      backdrop-filter: blur(14px) brightness(1.1) saturate(1.25);
      -webkit-backdrop-filter: blur(14px) brightness(1.1) saturate(1.25);
      background: oklch(0.22 0.04 210 / 0.2);
      z-index: 3;
    }

    /* Layer 3 — @layer utilities */
    .stratum-3 {
      width: min(500px, 64vw);
      height: min(320px, 40vh);
      backdrop-filter: blur(9px) brightness(1.12) saturate(1.3);
      -webkit-backdrop-filter: blur(9px) brightness(1.12) saturate(1.3);
      background: oklch(0.26 0.06 190 / 0.18);
      z-index: 4;
    }

    /* Layer 4 — @layer overrides (innermost, sharpest) */
    .stratum-4 {
      width: min(440px, 57vw);
      height: min(280px, 35vh);
      backdrop-filter: blur(5px) brightness(1.14) saturate(1.35);
      -webkit-backdrop-filter: blur(5px) brightness(1.14) saturate(1.35);
      background: oklch(0.30 0.08 170 / 0.16);
      z-index: 5;
    }

    .stratum-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 24px;
    }

    .stratum-inner .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
    }

    .stratum-inner .subtitle {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      line-height: 1.5;
    }

    .info-bar {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 24px;
      align-items: center;
      padding: 10px 24px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .info-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .info-item {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .info-bar {
        gap: 12px;
        padding: 8px 16px;
        bottom: 20px;
      }
      .info-item {
        font-size: 10px;
      }
      .stratum-label {
        font-size: 10px;
        top: -26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .stratum {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="strata-container" id="strataContainer">
    <div class="stratum stratum-0" data-depth="0.15">
      <span class="stratum-label">@layer reset</span>
    </div>
    <div class="stratum stratum-1" data-depth="0.30">
      <span class="stratum-label">@layer base</span>
    </div>
    <div class="stratum stratum-2" data-depth="0.50">
      <span class="stratum-label">@layer components</span>
      <div class="stratum-inner">
        <span class="title" style="font-size:13px; color: rgba(255,255,255,0.35);">components</span>
      </div>
    </div>
    <div class="stratum stratum-3" data-depth="0.70">
      <span class="stratum-label">@layer utilities</span>
      <div class="stratum-inner">
        <span class="title" style="font-size:13px; color: rgba(255,255,255,0.3);">utilities</span>
      </div>
    </div>
    <div class="stratum stratum-4" data-depth="1.0">
      <span class="stratum-label">!important</span>
      <div class="stratum-inner">
        <span class="title" style="font-size:18px;">Cascade Layers</span>
        <span class="subtitle">Priority flows inward.<br>Move your cursor to explore depth.</span>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <span class="info-item"><span class="info-dot" style="background: oklch(0.72 0.18 30);"></span>OKLCH</span>
    <span class="info-item"><span class="info-dot" style="background: oklch(0.72 0.15 210);"></span>Glass</span>
    <span class="info-item"><span class="info-dot" style="background: oklch(0.72 0.12 160);"></span>Parallax</span>
    <span class="info-item"><span class="info-dot" style="background: oklch(0.72 0.14 280);"></span>Depth Strata</span>
  </div>

  <script>
    (function() {
      // ── Canvas Background ──────────────────────────────────
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      let W, H;
      let mouseX = 0.5, mouseY = 0.5;
      let targetMouseX = 0.5, targetMouseY = 0.5;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Blob class — smooth organic shapes with OKLCH colors
      class Blob {
        constructor() {
          this.reset();
          // randomize initial position so they don't all spawn at origin
          this.x = (Math.random() - 0.5) * W * 0.8;
          this.y = (Math.random() - 0.5) * H * 0.8;
          this.tx = this.x;
          this.ty = this.y;
          this.ts = this.size;
          this.ta = this.alpha;
          this.tr = this.rotation;
        }

        reset() {
          this.tx = (Math.random() - 0.5) * W * 0.9;
          this.ty = (Math.random() - 0.5) * H * 0.9;
          this.ts = 120 + Math.random() * 350;
          this.ta = 0.25 + Math.random() * 0.45;
          this.tr = Math.random() * Math.PI * 2;
          // OKLCH hues: warm oranges, teals, purples, blues
          const hues = [25, 45, 180, 210, 250, 290, 320, 15];
          this.hue = hues[Math.floor(Math.random() * hues.length)];
          this.chroma = 0.08 + Math.random() * 0.18;
          this.lightness = 0.55 + Math.random() * 0.25;
          this.speedX = (Math.random() - 0.5) * 0.3;
          this.speedY = (Math.random() - 0.5) * 0.3;
          this.phase = Math.random() * Math.PI * 2;
        }

        update(dt, mx, my) {
          // Organic drift + subtle mouse influence
          const t = performance.now() * 0.0001;
          this.tx += Math.sin(t * this.speedX + this.phase) * 0.25 + mx * 40;
          this.ty += Math.cos(t * this.speedY + this.phase) * 0.25 + my * 40;
          this.ts += Math.sin(t * 1.3 + this.phase) * 0.15;

          // Lerp toward target
          this.x += (this.tx - this.x) * 0.003;
          this.y += (this.ty - this.y) * 0.003;
          this.size = this.size ? this.size + (this.ts - this.size) * 0.003 : this.ts;
          this.alpha = this.alpha ? this.alpha + (this.ta - this.alpha) * 0.003 : this.ta;
          this.rotation = this.rotation ? this.rotation + (this.tr - this.rotation) * 0.002 : this.tr;

          // Reset if drifted too far
          if (Math.abs(this.x) > W * 1.2 || Math.abs(this.y) > H * 1.2) {
            this.reset();
            this.x = this.tx;
            this.y = this.ty;
            this.size = this.ts;
            this.alpha = this.ta;
            this.rotation = this.tr;
          }
        }

        draw(ctx) {
          ctx.save();
          ctx.translate(W / 2 + this.x, H / 2 + this.y);
          ctx.rotate(this.rotation);

          const r = this.size;
          // Radial gradient for soft blob
          const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
          const color = `oklch(${this.lightness} ${this.chroma} ${this.hue} / ${this.alpha})`;
          grad.addColorStop(0, color);
          grad.addColorStop(0.5, `oklch(${this.lightness} ${this.chroma * 0.6} ${this.hue} / ${this.alpha * 0.5})`);
          grad.addColorStop(1, 'transparent');

          ctx.fillStyle = grad;
          ctx.beginPath();
          // Slightly irregular shape using a few sine-modulated points
          const points = 48;
          for (let i = 0; i < points; i++) {
            const angle = (i / points) * Math.PI * 2;
            const noiseScale = 0.06;
            const rr = r * (0.85 + 0.15 * Math.sin(angle * 5 + this.phase) * Math.cos(angle * 3 + this.phase * 1.7));
            const x = Math.cos(angle) * rr;
            const y = Math.sin(angle) * rr;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        }
      }

      const blobs = Array.from({ length: 7 }, () => new Blob());
      // Initialize positions immediately
      blobs.forEach(b => { b.x = b.tx; b.y = b.ty; b.size = b.ts; b.alpha = b.ta; b.rotation = b.tr; });

      // ── Parallax Strata ───────────────────────────────────
      const strataContainer = document.getElementById('strataContainer');
      const strata = document.querySelectorAll('.stratum');

      let currentMX = 0, currentMY = 0;
      const strataState = Array.from(strata, () => ({ tx: 0, ty: 0, x: 0, y: 0 }));

      // ── Render Loop ───────────────────────────────────────
      let lastTime = performance.now();

      function render(time) {
        const dt = Math.min((time - lastTime) / 16.667, 3); // cap at 3x to avoid jumps on tab switch
        lastTime = time;

        // Smooth mouse follow
        mouseX += (targetMouseX - mouseX) * 0.06;
        mouseY += (targetMouseY - mouseY) * 0.06;

        // Draw background
        ctx.clearRect(0, 0, W, H);

        // Dark base
        ctx.fillStyle = '#06060e';
        ctx.fillRect(0, 0, W, H);

        // Subtle radial vignette
        const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
        vg.addColorStop(0, 'transparent');
        vg.addColorStop(1, 'rgba(0,0,0,0.4)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);

        // Draw blobs
        blobs.forEach(b => b.update(dt, mouseX - 0.5, mouseY - 0.5));
        blobs.forEach(b => b.draw(ctx));

        // Update strata parallax positions
        const px = (mouseX - 0.5) * 60;
        const py = (mouseY - 0.5) * 40;

        strata.forEach((el, i) => {
          const depth = parseFloat(el.dataset.depth);
          strataState[i].tx = px * depth;
          strataState[i].ty = py * depth;
          strataState[i].x += (strataState[i].tx - strataState[i].x) * 0.08;
          strataState[i].y += (strataState[i].ty - strataState[i].y) * 0.08;
          el.style.transform = `translate(${strataState[i].x.toFixed(1)}px, ${strataState[i].y.toFixed(1)}px)`;
        });

        requestAnimationFrame(render);
      }

      // ── Event Handlers ────────────────────────────────────
      document.addEventListener('mousemove', (e) => {
        targetMouseX = e.clientX / W;
        targetMouseY = e.clientY / H;
      });

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          targetMouseX = e.touches[0].clientX / W;
          targetMouseY = e.touches[0].clientY / H;
        }
      }, { passive: true });

      window.addEventListener('resize', () => {
        resize();
        targetMouseX = 0.5;
        targetMouseY = 0.5;
      });

      // ── Start ─────────────────────────────────────────────
      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
