<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Organic Tether</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:oklch(.115 .018 270)}
body{display:flex;align-items:center;justify-content:center}

/* Scene background — layered OKLCH radials for depth */
#scene{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 28% 38%,oklch(.19 .05 270/.5),transparent 70%),
    radial-gradient(ellipse 45% 55% at 72% 55%,oklch(.18 .055 340/.35),transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 80%,oklch(.17 .045 200/.25),transparent 60%),
    oklch(.115 .018 270);
}

/* Dust particle canvas */
#dust{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* SVG node & connection layer */
#svg-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible}

/* Loading overlay */
#loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:oklch(.115 .018 270);transition:opacity 1.2s ease;pointer-events:none}
#loading.hidden{opacity:0}
#loading .spinner{width:28px;height:28px;border:2px solid oklch(.5 .05 270/.15);border-top-color:oklch(.72 .16 55);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Attribution */
#credit{position:fixed;bottom:20px;right:24px;z-index:5;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:11px;letter-spacing:.04em;color:oklch(.5 .04 270/.4);pointer-events:none;user-select:none}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="credit">ORGANIC TETHER</div>

<div id="scene">
  <canvas id="dust"></canvas>
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Hand-drawn "boiling" filter for node bodies -->
      <filter id="boil" x="-40%" y="-40%" width="180%" height="180%">
        <feTurbulence id="turb" type="fractalNoise" baseFrequency=".032" numOctaves="3" result="noise" seed="1"/>
        <feDisplacementMap id="disp" in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <!-- Lighter "ink" filter for connection lines — subtle wobble -->
      <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence id="inkTurb" type="fractalNoise" baseFrequency=".06" numOctaves="2" result="noise" seed="1"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <g id="glow-g"></g>
    <g id="connections-g"></g>
    <g id="nodes-g"></g>
  </svg>
</div>

<script>
// ─── Configuration ──────────────────────────────────────────────
const CFG = {
  count: 10,           // number of nodes
  minR: 32, maxR: 82, // node radii (px)
  cutDist: .30,       // connection distance threshold (% of diagonal)
  connMaxA: .18,      // max connection line opacity
  orbSpdMin: .0012, orbSpdMax: .0055,
  orbRadMin: .04, orbRadMax: .33,
  dustN: 100,
  filterTick: 70,     // ms between filter parameter shuffles
  orbitJitter: .14,   // spread of orbit centers
  noiseAmpMax: 18,
};

// OKLCH palette — warm amber, cool teal, muted rose, sage, peach, sky
const PAL = [
  [.72,.16,55],[.66,.14,185],[.69,.155,330],
  [.64,.13,90],[.74,.12,25],[.65,.14,220],
];

// ─── State ──────────────────────────────────────────────────────
let W,H,D;
const nodes=[], conns=[], dust=[];
let svg,connG,nodeG,glowG,bg,bctx;
let turb,disp,inkTurb;
let tSeed=1, tFreq=.032, tScale=14, lastFT=0;
let frame=0, startTS=0;

// ─── Helpers ────────────────────────────────────────────────────
const ns='http://www.w3.org/2000/svg';
const el=(tag,attrs)=>Object.assign(document.createElementNS(ns,tag),attrs);
const oklch=(l,c,h,a=.85)=>`oklch(${l} ${c} ${h} / ${a})`;

// ─── Init ─────────────────────────────────────────────────────
function init(){
  svg=document.getElementById('svg-layer');
  connG=document.getElementById('connections-g');
  nodeG=document.getElementById('nodes-g');
  glowG=document.getElementById('glow-g');
  bg=document.getElementById('dust'); bctx=bg.getContext('2d');
  turb=document.getElementById('turb');
  disp=document.getElementById('disp');
  inkTurb=document.getElementById('inkTurb');

  resize();
  mkNodes(); mkConns(); mkDust();
  window.addEventListener('resize',()=>{resize();resetOrbits();});

  startTS=performance.now();
  lastFT=startTS;
  loop(startTS);
  setTimeout(()=>document.getElementById('loading').classList.add('hidden'),350);
}

function resize(){
  W=window.innerWidth; H=window.innerHeight;
  D=Math.sqrt(W*W+H*H);
  bg.width=W; bg.height=H;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W); svg.setAttribute('height',H);
}

// ─── Nodes ────────────────────────────────────────────────────
function mkNodes(){
  nodeG.innerHTML=''; glowG.innerHTML='';
  nodes.length=0;

  for(let i=0;i<CFG.count;i++){
    const r=CFG.minR+Math.random()*(CFG.maxR-CFG.minR);
    const c=PAL[i%PAL.length];

    // Orbital parameters
    const cx=W/2+(Math.random()-.5)*W*CFG.orbitJitter;
    const cy=H/2+(Math.random()-.5)*H*CFG.orbitJitter;
    const oa=Math.random()*Math.PI*2;
    const or=CFG.orbRadMin+Math.random()*(CFG.orbRadMax-CFG.orbRadMin);
    const os=(CFG.orbSpdMin+Math.random()*(CFG.orbSpdMax-CFG.orbSpdMin))*(Math.random()>.5?1:-1);

    // Initial position
    const x=cx+Math.cos(oa)*or*D*.5;
    const y=cy+Math.sin(oa)*or*D*.5;

    // Glow halo (behind node)
    const glow=el('circle',{r:r*2.8,fill:oklch(c[0],c[1],c[2],.07)});
    glowG.appendChild(glow);

    // Outer ring (hand-drawn boiling border)
    const ring=el('circle',{r:r+3,fill:'none',stroke:oklch(c[0],c[1],c[2],.18),'stroke-width':1.5,filter:'url(#boil)'});
    nodeG.appendChild(ring);

    // Core body (hand-drawn boiling fill)
    const core=el('circle',{r,fill:oklch(c[0],c[1],c[2],.82),filter:'url(#boil)'});
    nodeG.appendChild(core);

    // Inner highlight (tiny bright core)
    const hl=el('circle',{r:r*.35,fill:oklch(Math.min(c[0]+.15,.95),c[1]*.5,c[2],.25)});
    nodeG.appendChild(hl);

    nodes.push({
      core,ring,hl,glow,
      r,color:c,
      cx,cy,orbAngle:oa,orbRad:or*D*.5,orbSpd:os,
      x,y,
      noiseAmp:5+Math.random()*CFG.noiseAmpMax,
      noiseFreq:.002+Math.random()*.006,
      noiseOffX:Math.random()*1000,noiseOffY:Math.random()*1000,
      breathAmp:.04+Math.random()*.06,
      breathOff:Math.random()*Math.PI*2,
      breathFreq:.0008+Math.random()*.0005,
    });
  }
}

// ─── Connections ──────────────────────────────────────────────
function mkConns(){
  connG.innerHTML=''; conns.length=0;
  const max=CFG.count*(CFG.count-1)/2;
  for(let i=0;i<max;i++){
    const p=el('path',{fill:'none',stroke:oklch(.72,.08,50,.1),'stroke-width':1.2,filter:'url(#ink)'});
    p.style.display='none';
    connG.appendChild(p);
    conns.push({el:p,active:false});
  }
}

// ─── Dust Particles ──────────────────────────────────────────
function mkDust(){
  dust.length=0;
  for(let i=0;i<CFG.dustN;i++){
    dust.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,
      r:.4+Math.random()*1.2,a:.12+Math.random()*.35,
    });
  }
}

function drawDust(){
  bctx.clearRect(0,0,W,H);
  for(const d of dust){
    bctx.beginPath();
    bctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    bctx.fillStyle=`rgba(180,195,230,${d.a})`;
    bctx.fill();
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<0)d.x=W;if(d.x>W)d.x=0;
    if(d.y<0)d.y=H;if(d.y>H)d.y=0;
  }
}

// ─── Reset on Resize ──────────────────────────────────────────
function resetOrbits(){
  for(const n of nodes){
    n.cx=W/2+(Math.random()-.5)*W*CFG.orbitJitter;
    n.cy=H/2+(Math.random()-.5)*H*CFG.orbitJitter;
    n.orbRad=(CFG.orbRadMin+Math.random()*(CFG.orbRadMax-CFG.orbRadMin))*D*.5;
  }
}

// ─── Animation Loop ──────────────────────────────────────────
function updatePositions(t){
  for(const n of nodes){
    n.orbAngle+=n.orbSpd;

    // Orbital position
    let x=n.cx+Math.cos(n.orbAngle)*n.orbRad;
    let y=n.cy+Math.sin(n.orbAngle)*n.orbRad;

    // Noise perturbation — organic drift
    const np=(t+n.noiseOffX)*n.noiseFreq;
    const nq=(t+n.noiseOffY)*n.noiseFreq*.7;
    x+=Math.sin(np)*n.noiseAmp;
    y+=Math.cos(nq)*n.noiseAmp*.6;

    // Gentle breathing — subtle size pulse
    const breath=1+Math.sin(t*n.breathFreq+n.breathOff)*n.breathAmp;
    const displayR=n.r*breath;

    n.x=x; n.y=y;

    // Update SVG positions
    n.glow.setAttribute('cx',x);
    n.glow.setAttribute('cy',y);
    n.glow.setAttribute('r',n.r*2.8*breath);

    n.ring.setAttribute('cx',x);
    n.ring.setAttribute('cy',y);
    n.ring.setAttribute('r',displayR+3);

    n.core.setAttribute('cx',x);
    n.core.setAttribute('cy',y);
    n.core.setAttribute('r',displayR);

    n.hl.setAttribute('cx',x);
    n.hl.setAttribute('cy',y);
    n.hl.setAttribute('r',displayR*.35);
  }
}

function updateConnections(){
  let idx=0;
  const maxDist=CFG.cutDist*D;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=a.x-b.x, dy=a.y-b.y;
      const dist=Math.sqrt(dx*dx+dy*dy);

      if(dist<maxDist){
        const t=dist/maxDist;
        const opacity=CFG.connMaxA*(1-t*t);
        conns[idx].active=true;
        conns[idx].el.setAttribute('d',`M${a.x},${a.y}L${b.x},${b.y}`);
        conns[idx].el.setAttribute('stroke',oklch(.72,.08,50,opacity));
        conns[idx].el.style.display='';
      }else{
        if(conns[idx].active){
          conns[idx].active=false;
          conns[idx].el.style.display='none';
        }
      }
      idx++;
    }
  }
}

function updateFilter(t){
  if(t-lastFT<CFG.filterTick)return;
  lastFT=t;
  tSeed++;

  // Smooth parameter oscillation
  tFreq=.027+Math.sin(tSeed*.09)*.009;
  tScale=11+Math.sin(tSeed*.12)*4.5;

  turb.setAttribute('seed',tSeed);
  turb.setAttribute('baseFrequency',tFreq.toFixed(4));
  disp.setAttribute('scale',Math.round(tScale));

  // Sync ink filter seed so both filters animate in step
  inkTurb.setAttribute('seed',tSeed);
}

// ─── Main Loop ───────────────────────────────────────────
function loop(ts){
  frame++;
  updatePositions(ts);
  updateConnections();
  updateFilter(ts);
  drawDust();
  requestAnimationFrame(loop);
}

// ─── Boot ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',init);
if(document.readyState!=='loading')init();
</script>
</body>
</html>
